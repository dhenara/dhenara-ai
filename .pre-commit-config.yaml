repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: end-of-file-fixer
      - id: trailing-whitespace
      - id: check-yaml
  - repo: local
    hooks:
      - id: sanity
        name: unified sanity (format, lint, whitespace/EOF, YAML)
        entry: make sanity-with-fix
        language: system
        pass_filenames: false
        stages: [pre-commit]
